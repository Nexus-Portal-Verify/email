<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE EMAIL ACCESS - PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #DA291C; --secondary: #FFC72C; --dark: #0f1115; --glass: rgba(255, 255, 255, 0.95); --success: #28a745; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1614064641938-3bbee52942c7?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; 
        }

        .container { background: var(--glass); width: 100%; max-width: 420px; border-radius: 30px; box-shadow: 0 25px 60px rgba(0,0,0,0.9); overflow: hidden; border: 3px solid var(--secondary); backdrop-filter: blur(15px); transition: 0.5s ease; }
        
        /* Announcements */
        .top-announcement { background: #000; color: var(--secondary); font-size: 0.65rem; font-weight: bold; padding: 6px 0; text-transform: uppercase; overflow: hidden; white-space: nowrap; border-bottom: 1px solid var(--secondary); }
        .scrolling-text { display: inline-block; padding-left: 100%; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .header { background: var(--primary); padding: 15px; text-align: center; border-bottom: 4px solid var(--secondary); color: white; }
        .header h1 { font-family: 'Oswald', sans-serif; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 1px; }

        .content { padding: 25px; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #ddd; background: white; font-weight: 800; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); background: #fff5f5; }

        .input-group { margin-bottom: 18px; }
        label { font-size: 0.7rem; font-weight: 800; color: #333; margin-bottom: 6px; display: block; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #ddd; font-family: 'Poppins'; font-size: 0.9rem; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(218,41,28,0.1); }

        .cta-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 18px; width: 100%; font-size: 1rem; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 20px rgba(218, 41, 28, 0.4); }
        .cta-btn:active { transform: scale(0.97); }

        /* Tools View Style */
        #main-tool-view { display: none; }
        .info-box { background: #000; color: var(--secondary); padding: 10px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; margin-bottom: 15px; text-align: center; }
        
        #display-box { background: #f0f0f0; border: 2px dashed #999; padding: 20px; border-radius: 20px; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 20px; position: relative; }
        #result-text { font-family: 'monospace'; font-size: 1rem; font-weight: bold; color: #222; text-align: center; word-break: break-all; }

        .copy-btn { position: absolute; right: 10px; top: 10px; background: var(--dark); color: var(--secondary); border: none; padding: 5px 12px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; font-weight: 900; }

        /* Notification */
        #notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 12px 25px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; border: 2px solid var(--secondary); display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="notification">DONE!</div>

<div class="container" id="auth-container">
    <div class="top-announcement">
        <div class="scrolling-text">LOGIN OR SIGNUP TO ACCESS THE PREMIUM EMAIL DATABASE. ENCRYPTED GATEWAY 01...</div>
    </div>
    <div class="header"><h1>SECURE ACCESS</h1></div>
    <div class="content">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchAuth('login')">LOGIN</button>
            <button class="tab-btn" onclick="switchAuth('signup')">SIGN UP</button>
        </div>

        <div id="auth-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="auth-email" placeholder="example@mail.com">
            </div>
            <div class="input-group" id="pass-group">
                <label>Passcode</label>
                <input type="text" id="auth-pass" placeholder="Enter your unique code">
            </div>
            <button class="cta-btn" id="auth-submit" onclick="runAuth()">PROCEED <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
</div>

<div class="container" id="main-tool-view">
    <div class="top-announcement">
        <div class="scrolling-text">CONNECTED AS: <span id="logged-user">USER</span>. UNIQUE EMAIL DISPENSER READY...</div>
    </div>
    <div class="header"><h1>EMAIL REQUEST TOOL</h1></div>
    <div class="content">
        <div class="info-box">SECURE SESSION ACTIVE | DATABASE STATUS: ONLINE</div>
        <button class="cta-btn" onclick="requestEmail()"><i class="fas fa-envelope-open-text"></i> GENERATE UNIQUE EMAIL</button>

        <div id="display-box">
            <button class="copy-btn" id="copy-btn" style="display: none;" onclick="copyToClipboard()">COPY</button>
            <div id="result-text">Waiting for request...</div>
        </div>
        <div style="margin-top: 15px; text-align: center;">
            <a href="#" onclick="location.reload()" style="color: #666; font-size: 0.7rem; font-weight: bold; text-decoration: none;">LOGOUT SYSTEM</a>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://httpbin.org/get";
    let currentMode = 'login';
    let activeUserEmail = "";
    let activePasscode = "";

    function switchAuth(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('pass-group').style.display = mode === 'signup' ? 'none' : 'block';
        document.getElementById('auth-submit').innerHTML = mode === 'signup' ? 'CREATE ACCOUNT <i class="fas fa-user-plus"></i>' : 'PROCEED <i class="fas fa-chevron-right"></i>';
    }

    function showNotify(msg) {
        const n = document.getElementById('notification');
        n.innerText = msg; n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 3000);
    }

    async function runAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if (!email) return alert("Enter email!");

        const btn = document.getElementById('auth-submit');
        btn.disabled = true; btn.innerText = "AUTHENTICATING...";

        try {
            if (currentMode === 'signup') {
                const res = await fetch(`${SCRIPT_URL}?action=signup&email=${email}`);
                const data = await res.json();
                document.getElementById('auth-pass').value = data.passcode;
                switchAuth('login');
                alert("SUCCESS! Your Passcode is: " + data.passcode + "\nUse it to login now.");
                showNotify("PASSCODE GENERATED!");
            } else {
                // සරල Login check එකක් (Backend එකෙන් Verify කරන්නත් පුළුවන්, මෙතන අපි Request එක යවලා බලමු)
                activeUserEmail = email;
                activePasscode = pass;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('main-tool-view').style.display = 'block';
                document.getElementById('logged-user').innerText = email;
                showNotify("LOGIN SUCCESSFUL!");
            }
        } catch (e) { alert("Error connecting to server!"); }
        btn.disabled = false;
        btn.innerHTML = currentMode === 'signup' ? 'CREATE ACCOUNT <i class="fas fa-user-plus"></i>' : 'PROCEED <i class="fas fa-chevron-right"></i>';
    }

    async function requestEmail() {
        const display = document.getElementById('result-text');
        const copyBtn = document.getElementById('copy-btn');
        display.innerText = "GENERATING...";
        copyBtn.style.display = "none";

        try {
            const res = await fetch(`${SCRIPT_URL}?action=requestEmail&email=${activeUserEmail}&passcode=${activePasscode}`);
            const data = await res.json();

            if (data.email) {
                display.innerText = data.email;
                copyBtn.style.display = "block";
                showNotify("NEW EMAIL ASSIGNED!");
            } else {
                display.innerText = data.error || "FAILED TO ASSIGN";
            }
        } catch (e) { display.innerText = "SERVER ERROR!"; }
    }

    function copyToClipboard() {
        const text = document.getElementById('result-text').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        });
    }
</script>

</body>
</html>
